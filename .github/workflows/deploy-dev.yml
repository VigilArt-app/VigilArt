name: Deploy to dev

on:
  push:
    branches:
      - dev

permissions:
  packages: write
  contents: read

jobs:
  run-ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    needs: run-ci
    environment:
      name: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: repo-owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_OUTPUT}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ steps.repo-owner.outputs.owner }}/vigilart-backend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web-app/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ steps.repo-owner.outputs.owner }}/vigilart-frontend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_ENV=development
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            API_URL=${{ secrets.API_URL }}

      - name: Deploy via SSH to dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /srv/VigilArt
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo REPO_OWNER=${{ steps.repo-owner.outputs.owner }} bash ./deploy.sh
