name: Deploy to dev

on:
  push:
    branches:
      - dev
      - fix/build-improvements

permissions:
  packages: write
  contents: read

jobs:
  run-tests:
    name: 🧪 Run E2E Tests
    runs-on: ubuntu-latest
    environment:
      name: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.20.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Shared Package
        run: pnpm --filter @vigilart/shared build

      - name: Generate Prisma Client
        run: pnpm --filter @vigilart/backend db:generate

      - name: Run E2E Tests
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm --filter @vigilart/backend test:e2e

  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    needs: run-tests
    environment:
      name: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke test
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          cleanup() {
            echo "Cleaning up containers and volumes..."
            doppler run -- docker compose -f docker-compose.prod.yml down -v
          }
          trap cleanup EXIT

          echo "Building and starting stack..."
          doppler run -- docker compose -f docker-compose.prod.yml up -d --build --wait
          echo "Running database migrations..."
          doppler run -- docker compose -f docker-compose.prod.yml --profile migrate run --rm migrator
          echo "✅ Smoke test passed: build, migrations, and health checks successful."

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: repo-owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_OUTPUT}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ steps.repo-owner.outputs.owner }}/vigilart-backend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web-app/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ steps.repo-owner.outputs.owner }}/vigilart-frontend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_ENV=development
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            API_URL=${{ secrets.API_URL }}

      - name: Deploy via SSH to dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /srv/VigilArt
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo REPO_OWNER=${{ steps.repo-owner.outputs.owner }} bash ./deploy.sh
