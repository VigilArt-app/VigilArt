name: Deploy to dev

on:
  push:
    branches:
      - dev

permissions:
  packages: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment:
      name: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
        with:
          token: ${{ secrets.DOPPLER_TOKEN }}
          version: 'latest'

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke test
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          echo "Starting stack with Doppler..."
          doppler run -- docker compose -f docker-compose.prod.yml up -d --build --wait
          echo "✅ Smoke test passed: stack is healthy."
          docker compose -f docker-compose.prod.yml down

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ env.OWNER }}/vigilart-backend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web-app/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ env.OWNER }}/vigilart-frontend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_ENV=development
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            API_URL=${{ secrets.API_URL }}

      - name: Deploy via SSH to dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT || 22 }}
          script: |
            cd /srv/VigilArt
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo REPO_OWNER=${{ env.OWNER }} ./deploy.sh
