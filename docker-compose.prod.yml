services:
  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: vigilart-base:latest

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3001:3001"
    depends_on:
      - db
      - base

  frontend:
    build:
      context: .
      dockerfile: web-app/Dockerfile.prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volume:
      - apk_volume:/home/apk
    ports:
      - "3000:3000"
    depends_on:
      - base

    mobile:
      container_name: mobile
      build: 
        context: mobile-app/Dockerfile.prod
      volumes:
        - apk_volume:/home/apk

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

volumes:
  postgres_prod_data:
  apk_volume:
