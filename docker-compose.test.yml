services:
  test-database:
    container_name: vigilart-test-db
    image: 'postgres:16-alpine'
    ports:
      - "${DB_PORT}:5433"
    env_file:
      - ./backend/.env.test
    environment:
      - NODE_ENV=test
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes: []
