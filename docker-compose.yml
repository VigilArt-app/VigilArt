services:
  dev-database:
    container_name: vigilart-dev-db
    image: 'postgres:16-alpine'
    ports:
      - "${DB_PORT}:5432"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - dev_database_volume:/var/lib/postgresql/data/
volumes:
  dev_database_volume: